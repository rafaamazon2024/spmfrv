name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🏗️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔨 Build project
        run: npm run build

      - name: 🔍 Test Connection
        run: |
          echo "Testing connection to ${{ secrets.SSH_HOST }} on port ${{ secrets.SSH_PORT || '22' }}..."
          nc -zv -w 5 ${{ secrets.SSH_HOST }} ${{ secrets.SSH_PORT || '22' }} || echo "Host unreachable"

      - name: 🚀 Deploy with rsync
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
          chmod 600 deploy_key
          rsync -avz -e "ssh -i deploy_key -p ${{ secrets.SSH_PORT || '22' }} -o StrictHostKeyChecking=no -o ConnectTimeout=10" ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/u691514392/domains/spmfrv.site/public_html/membros/
          rm deploy_key
